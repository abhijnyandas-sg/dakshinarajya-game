/* ─── HELPERS ─── */
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;};
const rand=n=>Math.floor(Math.random()*n);
const GROUPS={};SPACES.filter(s=>s.g).forEach(s=>{if(!GROUPS[s.g])GROUPS[s.g]=[];GROUPS[s.g].push(s.id);});
const ROUTE_IDS=SPACES.filter(s=>s.t==='route').map(s=>s.id);

function cellRect(id){
  const C=CORN,CS=CELL,B=BSZ;
  if(id===0)  return{x:B-C,y:B-C,w:C,h:C};
  if(id<=9)   return{x:B-C-id*CS,y:B-C,w:CS,h:C};
  if(id===10) return{x:0,y:B-C,w:C,h:C};
  if(id<=19)  return{x:0,y:B-C-(id-10)*CS,w:C,h:CS};
  if(id===20) return{x:0,y:0,w:C,h:C};
  if(id<=29)  return{x:C+(id-21)*CS,y:0,w:CS,h:C};
  if(id===30) return{x:B-C,y:0,w:C,h:C};
  return{x:B-C,y:C+(id-31)*CS,w:C,h:CS};
}
function stripSide(id){if(id>=1&&id<=9)return'top';if(id>=11&&id<=19)return'right';if(id>=21&&id<=29)return'bottom';if(id>=31&&id<=39)return'left';return null;}
function calcRent(sp,pos,ownerId,ps){
  if(sp.t==='route'){const c=ROUTE_IDS.filter(r=>ps[r]?.owner===ownerId).length;return[25,50,100,200][Math.min(c-1,3)];}
  const p=ps[pos];if(!p)return 0;
  const owns=(GROUPS[sp.g]||[]).every(id=>ps[id]?.owner===ownerId);
  if(p.buildings===0)return owns?sp.rent[0]*2:sp.rent[0];
  return sp.rent[Math.min(p.buildings,5)];
}

/* ─── BOARD CELL ─── */
function BoardCell({sp,pst,players,onClick}){
  const r=cellRect(sp.id);const prop=pst[sp.id];
  const tokens=players.filter(p=>p.pos===sp.id&&!p.bankrupt);
  const side=stripSide(sp.id);const gc=sp.g?GC[sp.g]:null;
  const ownCol=prop?.owner!==undefined?CHARS[prop.owner]?.token:null;
  const isLR=(sp.id>=11&&sp.id<=19)||(sp.id>=31&&sp.id<=39);
  const rot=isLR?(sp.id<=19?'rotate(90deg)':'rotate(-90deg)'):(sp.id>=21&&sp.id<=29?'rotate(180deg)':'none');
  const maxTxt=isLR?r.h-10:r.w-4;
  // Special space bg tint
  const bgMap={yagna:'#FEF3C7',planet:'#EDE9FE',festival:'#ECFDF5',weapon:'#FEF2F2'};
  const bg=sp.g?'#FEF9ED':(bgMap[sp.t]||'#FEF9ED');
  return(
    <div onClick={()=>onClick(sp)} style={{position:'absolute',left:r.x,top:r.y,width:r.w,height:r.h,overflow:'hidden',cursor:'pointer',border:`1.5px solid ${ownCol||'#B8984A'}`,background:bg,boxSizing:'border-box',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',userSelect:'none'}}>
      {gc&&<div style={{position:'absolute',[side]:0,...(side==='top'||side==='bottom'?{left:0,width:'100%',height:9}:{top:0,height:'100%',width:9}),background:gc,opacity:0.9}}/>}
      {sp.t==='corner'&&<div style={{fontSize:CORN>70?18:14,lineHeight:1}}>{sp.icon}</div>}

/* ══════════════════════════════════════════════════════════════
   MAIN GAME COMPONENT
══════════════════════════════════════════════════════════════ */
function DakshinaRajya(){
  const[screen,setScreen]=useState('setup');
  const[numP,setNumP]=useState(2);
  const[pSetup,setPSetup]=useState([{name:'Rani Priya',char:0},{name:'Rani Devi',char:1},{name:'Rani Kavya',char:2},{name:'Rani Anika',char:3}]);
  const[players,setPlayers]=useState([]);
  const[pst,setPst]=useState({});
  const[cur,setCur]=useState(0);
  const[dice,setDice]=useState([3,4]);
  const[rolling,setRolling]=useState(false);
  const[phase,setPhase]=useState('roll');
  const[modal,setModal]=useState(null);
  const[log,setLog]=useState([]);
  const[decks,setDecks]=useState({d:[],c:[]});
  const[festDeck,setFestDeck]=useState([]);
  const[planetDeck,setPlanetDeck]=useState([]);

  const addLog=useCallback(msg=>setLog(l=>[msg,...l.slice(0,29)]),[]);

  function startGame(){
    const ps=Array.from({length:numP},(_,i)=>({
      id:i,name:pSetup[i].name,char:pSetup[i].char,
      pos:0,gold:1500,grain:3,scholars:1,
      bankrupt:false,inJail:false,jailTurns:0,jailFree:0,
      weapons:[],skipBuild:false,frozen:false,rentProtect:false,
      discountBuy:false,rentBonus:0,noBuy:false,protect:false,
    }));
    setPlayers(ps);setPst({});setCur(0);setDice([3,4]);setPhase('roll');setModal(null);
    setLog([`🏰 Dakshina Rajya begins! ${ps[0].name} opens the royal court!`]);
    setDecks({d:shuffle([...Array(DECREE.length).keys()]),c:shuffle([...Array(CHRONICLE.length).keys()])});
    setFestDeck(shuffle([...Array(FESTIVALS.length).keys()]));
    setPlanetDeck(shuffle([...Array(PLANETS.length).keys()]));
    setScreen('game');
  }

  const drawDecree=()=>{const arr=decks.d.length?decks.d:shuffle([...Array(DECREE.length).keys()]);const[i,...r]=arr;setDecks(dk=>({...dk,d:r.length?r:shuffle([...Array(DECREE.length).keys()])}));return i;};
  const drawChronicle=()=>{const arr=decks.c.length?decks.c:shuffle([...Array(CHRONICLE.length).keys()]);const[i,...r]=arr;setDecks(dk=>({...dk,c:r.length?r:shuffle([...Array(CHRONICLE.length).keys()])}));return i;};
  const drawFest=()=>{const arr=festDeck.length?festDeck:shuffle([...Array(FESTIVALS.length).keys()]);const[i,...r]=arr;setFestDeck(r.length?r:shuffle([...Array(FESTIVALS.length).keys()]));return i;};
  const drawPlanet=()=>{const arr=planetDeck.length?planetDeck:shuffle([...Array(PLANETS.length).keys()]);const[i,...r]=arr;setPlanetDeck(r.length?r:shuffle([...Array(PLANETS.length).keys()]));return i;};

  function doRoll(){
    if(phase!=='roll'||rolling)return;
    const player=players[cur];if(!player||player.bankrupt)return;
    if(player.frozen){setPlayers(ps=>ps.map(p=>p.id===cur?{...p,frozen:false}:p));addLog(`${player.name} is unfrozen! They skip this turn.`);setPhase('end');return;}
    setRolling(true);let n=0;
    const anim=()=>{n++;setDice([rand(6)+1,rand(6)+1]);if(n<8)setTimeout(anim,90);else{const d1=rand(6)+1,d2=rand(6)+1;setDice([d1,d2]);setRolling(false);processRoll(player,d1,d2);}};
    setTimeout(anim,90);
  }

  function processRoll(player,d1,d2){
    const steps=d1+d2,doubles=d1===d2;
    if(player.inJail){
      if(doubles||player.jailFree>0){
        const np={...player,inJail:false,jailTurns:0,jailFree:(!doubles&&player.jailFree>0)?player.jailFree-1:player.jailFree};
        addLog(`${player.name} escapes Forest Exile!`);doMove(np,steps,d1,d2);
      }else if(player.jailTurns>=2){
        const np={...player,inJail:false,jailTurns:0,gold:player.gold-150};
        addLog(`${player.name} paid 150g to leave.`);setPlayers(ps=>ps.map(p=>p.id===player.id?np:p));doMove(np,steps,d1,d2);
      }else{
        setPlayers(ps=>ps.map(p=>p.id===player.id?{...p,jailTurns:p.jailTurns+1}:p));
        addLog(`${player.name} remains in exile (${player.jailTurns+2}/3).`);setPhase('end');
      }return;
    }
    doMove(player,steps,d1,d2);
  }

  function doMove(player,steps,d1,d2){
    const newPos=(player.pos+steps)%40,passedGo=player.pos+steps>=40;
    const gold=player.gold+(passedGo?200:0);
    const np={...player,pos:newPos,gold};
    setPlayers(ps=>ps.map(p=>p.id===player.id?np:p));
    if(d1&&d2)addLog(`${player.name} rolled ${d1}+${d2}=${steps}`);
    if(passedGo)addLog(`${player.name} passed Royal Court! +200g`);
    addLog(`→ ${SPACES[newPos].name.replace(/\n/g,' ')}`);
    setTimeout(()=>landOn(np,newPos),250);
  }

  function landOn(player,pos){
    const sp=SPACES[pos];
    if(sp.t==='corner'){if(pos===30){setPlayers(ps=>ps.map(p=>p.id===player.id?{...p,pos:10,inJail:true,jailTurns:0}:p));addLog(`${player.name} is banished!`);}setPhase('end');return;}
    if(sp.t==='tax'){const pay=Math.min(sp.amt,player.gold);setPlayers(ps=>ps.map(p=>p.id===player.id?{...p,gold:p.gold-(player.protect?0:pay)}:p));if(!player.protect){addLog(`${player.name} pays ${pay}g tax.`);if(player.gold-pay<=0)goBankrupt(player);}else{addLog(`${player.name} is protected from tax!`);setPlayers(ps=>ps.map(p=>p.id===player.id?{...p,protect:false}:p));}setPhase('end');return;}
    if(sp.t==='yagna'){setModal({type:'yagna',player});setPhase('action');return;}
    if(sp.t==='planet'){const idx=drawPlanet();setModal({type:'planet',event:PLANETS[idx],player});setPhase('action');return;}
    if(sp.t==='festival'){const idx=drawFest();setModal({type:'festival',event:FESTIVALS[idx],player});setPhase('action');return;}
    if(sp.t==='weapon'){setModal({type:'weaponHoard',player});setPhase('action');return;}
    if(sp.t==='chance'){const idx=drawDecree();const card=DECREE[idx];addLog(`📯 ${player.name}: "${card.title}"`);setModal({type:'card',card,player});setPhase('action');return;}
    if(sp.t==='chest'){const idx=drawChronicle();const card=CHRONICLE[idx];addLog(`📜 ${player.name}: "${card.title}"`);setModal({type:'card',card,player});setPhase('action');return;}
    if(sp.t==='prop'||sp.t==='route'){
      const prop=pst[pos];
      if(!prop){setModal({type:'buy',space:sp,player});setPhase('action');}
      else if(prop.owner!==player.id){
        if(player.rentProtect){setPlayers(ps=>ps.map(p=>p.id===player.id?{...p,rentProtect:false}:p));addLog(`${player.name}'s Poturaju shield blocks the rent!`);setPhase('end');return;}
        const rent=calcRent(sp,pos,prop.owner,pst);
        const ownBonus=players[prop.owner]?.rentBonus>0?1.25:1;
        const pay=Math.min(Math.round(rent*ownBonus),player.gold);
        setPlayers(ps=>ps.map(p=>{if(p.id===player.id)return{...p,gold:p.gold-pay};if(p.id===prop.owner)return{...p,gold:p.gold+pay};return p;}));
        const ownr=players.find(p=>p.id===prop.owner);
        addLog(`${player.name} pays ${pay}g rent to ${ownr?.name}.`);
        if(player.gold-pay<=0)goBankrupt(player);
        setPhase('end');
      }else setPhase('end');
      return;
    }
    setPhase('end');
  }

  function goBankrupt(player){
    setPlayers(ps=>ps.map(p=>p.id===player.id?{...p,bankrupt:true}:p));
    addLog(`💔 ${player.name} is bankrupt!`);
  }

  function applyDecreeCard(card,player,extras={}){
    const e=card.eff||{};let np=[...players];const pi=np.findIndex(p=>p.id===player.id);
    if(pi<0)return;
    if(e.g){np[pi]={...np[pi],gold:Math.max(0,np[pi].gold+e.g)};addLog(`${player.name}: ${e.g>0?'+':''}${e.g}g`);}
    if(e.grain){np[pi]={...np[pi],grain:Math.max(0,np[pi].grain+e.grain)};}
    if(e.sch){np[pi]={...np[pi],scholars:np[pi].scholars+e.sch};}
    if(e.jailFree){np[pi]={...np[pi],jailFree:np[pi].jailFree+1};addLog(`${player.name} gets Exile Free card!`);}
    if(e.each){np=np.map((p,i)=>i===pi?{...p,gold:p.gold+(numP-1)*e.each}:{...p,gold:Math.max(0,p.gold-e.each)});addLog(`${player.name} collects ${e.each}g from each.`);}
    if(e.each10){np=np.map((p,i)=>i===pi?{...p,gold:p.gold+(numP-1)*10}:{...p,gold:Math.max(0,p.gold-10)});}
    if(e.buildTax){let tax=0;Object.entries(pst).forEach(([id,v])=>{if(v?.owner===player.id)tax+=v.buildings<=4?v.buildings*45:120;});np[pi]={...np[pi],gold:Math.max(0,np[pi].gold-tax)};addLog(`${player.name} donates ${tax}g stupa fund.`);}
    if(e.routeBonus){const n=ROUTE_IDS.filter(r=>pst[r]?.owner===player.id).length;const b=n*e.routeBonus;np[pi]={...np[pi],gold:np[pi].gold+b};addLog(`${player.name} earns ${b}g route toll.`);}
    if(e.toJail){np[pi]={...np[pi],pos:10,inJail:true,jailTurns:0};addLog(`${player.name} goes to exile!`);}
    if(e.sabotage&&extras.sabTgt){const ti=np.findIndex(p=>p.id===extras.sabTgt.id);if(ti>=0){np[ti]={...np[ti],grain:Math.max(0,np[ti].grain-3),skipBuild:true};addLog(`💀 Sabotage! ${extras.sabTgt.name} loses 3 grain.`);}}
    if(e.mv!==undefined){const pg=e.mv<np[pi].pos;if(pg)np[pi]={...np[pi],gold:np[pi].gold+200};np[pi]={...np[pi],pos:e.mv};setPlayers(np);setModal(null);setTimeout(()=>landOn(np[pi],e.mv),200);return;}
    if(e.quiz){setModal({type:'quiz',player:np[pi]});setPlayers(np);return;}
    if(e.spy){setPlayers(np);setModal(null);setPhase('end');return;}
    setPlayers(np);setModal(null);
    if(np[pi].gold<=0)goBankrupt(np[pi]);else setPhase('end');
  }

  function applyYagna(yagna,player){
    if(player.gold<yagna.cost.g||player.grain<yagna.cost.gr||player.scholars<yagna.cost.sc){addLog('Cannot afford this yagna!');return;}
    let np=[...players];const pi=np.findIndex(p=>p.id===player.id);
    np[pi]={...np[pi],gold:np[pi].gold-yagna.cost.g+yagna.eff.gold||np[pi].gold-yagna.cost.g,grain:np[pi].grain-yagna.cost.gr,scholars:np[pi].scholars-yagna.cost.sc};
    if(yagna.eff.gold)np[pi]={...np[pi],gold:np[pi].gold+yagna.eff.gold};
    if(yagna.eff.rentBonus)np[pi]={...np[pi],rentBonus:(np[pi].rentBonus||0)+yagna.eff.rentBonus};
    if(yagna.eff.protect)np[pi]={...np[pi],protect:true};
    if(yagna.eff.discountBuy)np[pi]={...np[pi],discountBuy:true};
    if(yagna.eff.extraRoll){addLog(`${player.name} performs ${yagna.skt}! Rolls again!`);setPlayers(np);setModal(null);setPhase('roll');return;}
    if(yagna.eff.weapon){// Give random weapon
      const available=WEAPONS.filter(w=>!np[pi].weapons.includes(w.id));
      if(available.length&&np[pi].weapons.length<4){const w=available[rand(available.length)];np[pi]={...np[pi],weapons:[...np[pi].weapons,w.id]};addLog(`${player.name} receives ${w.tel} (${w.skt})!`);}
    }
    addLog(`🔥 ${player.name} performs ${yagna.name}! ${yagna.desc}`);
    setPlayers(np);setModal(null);setPhase('end');
  }

  function applyPlanet(event,player,extras={}){
    let np=[...players];const pi=np.findIndex(p=>p.id===player.id);
    const e=event.eff||{};
    if(e.gold)np[pi]={...np[pi],gold:Math.max(0,np[pi].gold+e.gold)};
    if(e.grain)np[pi]={...np[pi],grain:Math.max(0,np[pi].grain+e.grain)};
    if(e.scholars)np[pi]={...np[pi],scholars:np[pi].scholars+e.scholars};
    if(e.skipBuild)np[pi]={...np[pi],skipBuild:true};
    if(e.noBuy)np[pi]={...np[pi],noBuy:true};
    if(e.routeBlock){// Mark route block — simple: player pays half per route they own
      const ownedRoutes=ROUTE_IDS.filter(r=>pst[r]?.owner===player.id);
      addLog(`${player.name}'s routes are eclipsed for ${e.routeBlock} turns (reduced income).`);
    }
    if(e.goldAll){np=np.map(p=>({...p,gold:Math.max(0,p.gold+e.goldAll)}));addLog(`🌞 Solar eclipse! All players lose ${Math.abs(e.goldAll)}g.`);}
    if(e.loseWeaponOrGold){
      if(extras.sacrificeWeapon)np[pi]={...np[pi],weapons:np[pi].weapons.filter(w=>w!==extras.sacrificeWeapon)};
      else if(extras.pay200)np[pi]={...np[pi],gold:Math.max(0,np[pi].gold-200)};
    }
    if(!event.bh)addLog(`⭐ ${player.name}: ${event.name} — blessed!`);
    else addLog(`♄ ${player.name}: ${event.name} affliction strikes!`);
    setPlayers(np);setModal(null);
    if(np[pi].gold<=0)goBankrupt(np[pi]);else setPhase('end');
  }

  function applyFestival(event,player){
    let np=[...players];const pi=np.findIndex(p=>p.id===player.id);
    const e=event.eff||{};
    if(e.gold)np[pi]={...np[pi],gold:np[pi].gold+e.gold};
    if(e.grain)np[pi]={...np[pi],grain:np[pi].grain+e.grain};
    if(e.scholars)np[pi]={...np[pi],scholars:np[pi].scholars+e.scholars};
    if(e.rentProtect)np[pi]={...np[pi],rentProtect:true};
    if(e.allGrain)np=np.map(p=>({...p,grain:p.grain+e.allGrain}));
    if(e.allGold)np=np.map(p=>({...p,gold:p.gold+e.allGold}));
    if(e.allSch)np=np.map(p=>({...p,scholars:p.scholars+e.allSch}));
    if(e.bridgeToll){np=np.map((p,i)=>i===pi?{...p,gold:p.gold+(np.length-1)*e.bridgeToll}:{...p,gold:Math.max(0,p.gold-e.bridgeToll)});addLog(`${player.name} collects bridge tolls!`);}
    if(e.mv!==undefined){const pg=e.mv<np[pi].pos;if(pg)np[pi]={...np[pi],gold:np[pi].gold+200};np[pi]={...np[pi],pos:e.mv};setPlayers(np);setModal(null);setTimeout(()=>landOn(np[pi],e.mv),200);return;}
    if(e.gold<0){if(np[pi].gold<=0){goBankrupt(np[pi]);setModal(null);return;}}
    addLog(`${event.icon} ${event.title} — ${event.type==='river'?'River blessing!':'Devata Utsavam!'}`);
    setPlayers(np);setModal(null);setPhase('end');
  }

  function takeWeapon(weaponId,player){
    if(player.weapons.length>=4){addLog('Arsenal is full!');setModal(null);setPhase('end');return;}
    const w=WEAPONS.find(x=>x.id===weaponId);
    setPlayers(ps=>ps.map(p=>p.id===player.id?{...p,weapons:[...p.weapons,weaponId]}:p));
    addLog(`${player.name} acquires ${w.tel} (${w.skt})! ${w.desc}`);
    setModal(null);setPhase('end');
  }

  function useWeapon(weaponObj,targetPlayer,targetProp){
    const player=players[cur];if(!player)return;
    const e=weaponObj.eff;
    let np=[...players];const pi=np.findIndex(p=>p.id===player.id);
    // Remove weapon from inventory
    np[pi]={...np[pi],weapons:np[pi].weapons.filter(w=>w!==weaponObj.id)};
    if(e.extraRent){// Applied on next rent collection — mark flag
      np[pi]={...np[pi],extraRent:true};addLog(`${player.name} raises the ${weaponObj.skt}! Next rent +50%`);}
    if(e.steal){const ti=np.findIndex(p=>targetPlayer&&p.id===targetPlayer.id);if(ti>=0){const stolen=Math.min(100,np[ti].gold);np[ti]={...np[ti],gold:np[ti].gold-stolen};np[pi]={...np[pi],gold:np[pi].gold+stolen};addLog(`${player.name}'s Chakra! Steals ${stolen}g from ${targetPlayer.name}.`);}}
    if(e.blockRent){np[pi]={...np[pi],rentProtect:true};addLog(`${player.name}'s Gadā raises a shield! Next rent blocked.`);}
    if(e.gold){np[pi]={...np[pi],gold:np[pi].gold+e.gold};addLog(`${player.name}'s Śakti! +${e.gold}g from royal treasury.`);}
    if(e.sendExile&&targetPlayer){const ti=np.findIndex(p=>p.id===targetPlayer.id);if(ti>=0){np[ti]={...np[ti],pos:10,inJail:true,jailTurns:0};addLog(`${player.name}'s Pāśupatāstra! ${targetPlayer.name} banished to Forest Exile!`);}}
    if(e.destroyBuilds&&targetProp){const pid=targetProp.id;setPst(ps=>{if(ps[pid])return{...ps,[pid]:{...ps[pid],buildings:0}};return ps;});addLog(`${player.name}'s Brahmāstra! All buildings at ${targetProp.name.replace('\n','')} destroyed!`);}
    if(e.burnBuild&&targetProp){const pid=targetProp.id;setPst(ps=>{if(ps[pid]&&ps[pid].buildings>0)return{...ps,[pid]:{...ps[pid],buildings:ps[pid].buildings-1}};return ps;});addLog(`${player.name}'s Agneyāstra! 1 building at ${targetProp.name.replace('\n','')} burned!`);}
    if(e.freeze&&targetPlayer){const ti=np.findIndex(p=>p.id===targetPlayer.id);if(ti>=0){np[ti]={...np[ti],frozen:true};addLog(`${player.name}'s Nāgāstra! ${targetPlayer.name} is frozen for 1 turn!`);}}
    if(e.freeExile){if(player.inJail){np[pi]={...np[pi],inJail:false,jailTurns:0};addLog(`${player.name}'s Garuḍāstra! Liberated from exile!`);}else{addLog(`${player.name}'s Garuḍāstra! Eagle soars freely.`);}}
    if(e.lightning&&targetPlayer){const ti=np.findIndex(p=>p.id===targetPlayer.id);if(ti>=0){const dmg=Math.min(200,np[ti].gold);np[ti]={...np[ti],gold:np[ti].gold-dmg};np[pi]={...np[pi],gold:np[pi].gold+dmg/2|0};addLog(`${player.name}'s Indrāstra! ${targetPlayer.name} struck for ${dmg}g!`);}}
    if(e.quizWin){setModal({type:'quiz',player:np[pi]});setPlayers(np);return;}
    setPlayers(np);setModal(null);
  }

  function buyProp(sp,player){
    const price=player.discountBuy?Math.ceil(sp.price/2):sp.price;
    if(player.gold<price){addLog('Not enough gold.');setModal(null);setPhase('end');return;}
    setPlayers(ps=>ps.map(p=>p.id===player.id?{...p,gold:p.gold-price,discountBuy:false}:p));
    setPst(ps=>({...ps,[sp.id]:{owner:player.id,buildings:0}}));
    addLog(`${player.name} acquires ${sp.name.replace(/\n/g,' ')} for ${price}g!`);
    setModal(null);setPhase('end');
  }

  function tryBuild(playerId,spaceId){
    const sp=SPACES[spaceId];const pl=players.find(p=>p.id===playerId);
    if(!pl||pl.bankrupt)return;
    if(pl.id!==cur){addLog('Can only build on your own turn.');return;}
    if(phase!=='end'){addLog('Finish current action first.');return;}
    if(pl.skipBuild){addLog(`${pl.name} cannot build (sabotage/affliction!)`);return;}
    const grp=(GROUPS[sp.g]||[]);
    if(!grp.every(id=>pst[id]?.owner===playerId)){addLog('Own ALL cities in group first!');return;}
    const curr=pst[spaceId]?.buildings||0;if(curr>=5){addLog('Maximum buildings reached!');return;}
    const cost=BUILD_COST[sp.g]||100;
    if(pl.gold<cost){addLog(`Need ${cost}g (have ${pl.gold}g).`);return;}
    setPlayers(ps=>ps.map(p=>p.id===playerId?{...p,gold:p.gold-cost}:p));
    setPst(ps=>({...ps,[spaceId]:{...ps[spaceId],buildings:curr+1}}));
    addLog(`${pl.name} builds ${curr<4?'🏛️ Vihara':'🏯 Mahastupa'} at ${sp.name.replace(/\n/g,' ')}! (${cost}g)`);
  }

  function endTurn(){
    if(phase!=='end')return;
    const active=players.filter(p=>!p.bankrupt);
    if(active.length<=1){setScreen('over');return;}
    setPlayers(ps=>ps.map(p=>p.id===cur?{...p,skipBuild:false,noBuy:false,rentBonus:Math.max(0,(p.rentBonus||0)-1)}:p));
    let next=(cur+1)%players.length;
    while(players[next]?.bankrupt)next=(next+1)%players.length;
    setCur(next);setPhase('roll');
    addLog(`─── ${players[next]?.name}'s turn! ───`);
  }

  if(screen==='setup')return<SetupScreen numP={numP} setNumP={setNumP} pSetup={pSetup} setPSetup={setPSetup} onStart={startGame}/>;
  const actives=players.filter(p=>!p.bankrupt);
  if(screen==='over'||actives.length===1){const w=actives[0]||players[0];return<WinScreen winner={w} onRestart={()=>setScreen('setup')}/>;}
  const curPl=players[cur]||players[0];

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(150deg,#0c0800 0%,#1a1106 50%,#0c0800 100%)',display:'flex',flexDirection:'column',fontFamily:'EB Garamond,serif'}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');
        *{box-sizing:border-box;}
        @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
        @keyframes spinR{from{transform:rotate(0)}to{transform:rotate(-360deg)}}
        ::-webkit-scrollbar{width:4px;background:rgba(255,255,255,0.04)}
        ::-webkit-scrollbar-thumb{background:rgba(200,169,81,0.25);border-radius:2px}
      `}</style>
      {/* Header */}
      <div style={{padding:'8px 18px',borderBottom:'1px solid rgba(200,169,81,0.18)',display:'flex',alignItems:'center',justifyContent:'space-between',background:'rgba(0,0,0,0.35)',flexShrink:0}}>
        <div style={{fontFamily:'Cinzel Decorative,serif',color:'#FFD700',fontSize:16,letterSpacing:1}}>DAKSHINA RAJYA</div>
        <div style={{display:'flex',gap:12,fontSize:10,color:'#C8B060',fontFamily:'Cinzel,serif',letterSpacing:1}}>
          <span>🔥 Yagnas</span><span>⭐ Oracles</span><span>⚔️ Astras</span><span>🌺 Utsavams</span>
        </div>
        <button onClick={()=>setScreen('setup')} style={{padding:'4px 11px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:5,color:'rgba(255,255,255,0.4)',cursor:'pointer',fontFamily:'Cinzel,serif',fontSize:10}}>New Game</button>
      </div>
      <div style={{display:'flex',flex:1,padding:10,gap:10,overflow:'hidden',minHeight:0}}>
        {/* Left: players */}
        <div style={{width:195,flexShrink:0,display:'flex',flexDirection:'column',overflowY:'auto'}}>
          <div style={{color:'#C8A951',fontFamily:'Cinzel,serif',fontSize:9,letterSpacing:2,marginBottom:7}}>PLAYERS & WEAPONS</div>
          {players.map(p=><PlayerPanel key={p.id} pl={p} isActive={p.id===cur&&!p.bankrupt} pst={pst} onBuild={tryBuild} onUseWeapon={(pid,wid)=>{if(p.id===cur&&phase==='end')setModal({type:'weaponUse',weaponId:wid,player:p});}} phase={phase}/>)}
          <div style={{color:'#C8A951',fontFamily:'Cinzel,serif',fontSize:9,letterSpacing:2,marginTop:8,marginBottom:5}}>GAME LOG</div>
          <div style={{overflowY:'auto',flex:1}}>
            {log.map((l,i)=><div key={i} style={{color:i===0?'#FFE082':'rgba(255,255,255,0.35)',fontSize:10,padding:'2px 0',borderBottom:'1px solid rgba(255,255,255,0.04)',fontFamily:'EB Garamond,serif',lineHeight:1.4}}>{l}</div>)}
          </div>
        </div>
        {/* Center: board */}
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-start',overflow:'auto',minWidth:0}}>
          <div style={{position:'relative',width:BSZ,height:BSZ,flexShrink:0}}>
            <div style={{position:'absolute',inset:0,background:'#FEF9ED',border:'2px solid #8B6914',borderRadius:2}}/>
            {/* Center art */}
            <div style={{position:'absolute',left:CORN,top:CORN,width:BSZ-CORN*2,height:BSZ-CORN*2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#FDF4D4'}}>
              <div style={{fontFamily:'Cinzel Decorative,serif',color:'#7B5C10',fontSize:17,textAlign:'center',lineHeight:1.3,marginBottom:4}}>DAKSHINA<br/>RAJYA</div>
              <div style={{color:'#9A7A40',fontSize:9,fontFamily:'Cinzel,serif',letterSpacing:2,marginBottom:8}}>5th CENTURY CE</div>
              <svg width={180} height={120} viewBox="0 0 180 120">
                <path d="M50 15 Q70 8 95 12 Q120 8 138 20 Q150 35 146 55 Q140 78 130 96 Q115 115 95 122 Q75 128 57 118 Q40 106 34 84 Q26 60 30 38 Q35 22 50 15Z" fill="none" stroke="#C8A951" strokeWidth={1.5} opacity={0.6}/>
                <path d="M36 66 Q72 60 108 56 Q132 54 146 60" fill="none" stroke="#4490C8" strokeWidth={1.3} opacity={0.5}/>
                <path d="M40 88 Q78 82 115 78 Q138 76 148 83" fill="none" stroke="#4490C8" strokeWidth={1.3} opacity={0.5}/>
                {[[92,40,'Kotilingala'],[74,72,'Amaravati'],[97,64,'Nagarjunakonda'],[110,50,'Vengi'],[63,108,'Ghantasala']].map(([x,y,nm])=>(
                  <g key={nm}><circle cx={x} cy={y} r={3} fill="#C8A951"/><text x={x+5} y={y+3} fontSize={5.5} fill="#7B5C10" fontFamily="Cinzel,serif">{nm}</text></g>
                ))}
              </svg>
              <div style={{background:CHARS[curPl.char].token+'1A',border:`1px solid ${CHARS[curPl.char].token}`,borderRadius:7,padding:'4px 11px',marginTop:6,color:CHARS[curPl.char].token,fontFamily:'Cinzel,serif',fontSize:10,textAlign:'center'}}>
                {curPl.name}'s Turn
                <div style={{fontSize:8,color:'rgba(255,255,255,0.4)',marginTop:1}}>🪙{curPl.gold} 🌾{curPl.grain} 📚{curPl.scholars}{curPl.weapons?.length?` ⚔️×${curPl.weapons.length}`:''}</div>
              </div>
            </div>
            {SPACES.map(sp=><BoardCell key={sp.id} sp={sp} pst={pst} players={players} onClick={(s)=>setModal({type:'info',space:s})}/>)}
          </div>
        </div>
        {/* Right: controls */}
        <div style={{width:180,flexShrink:0,display:'flex',flexDirection:'column',gap:9}}>
          <div style={{background:'rgba(0,0,0,0.28)',border:'1px solid rgba(200,169,81,0.18)',borderRadius:10,padding:14,display:'flex',flexDirection:'column',alignItems:'center',gap:9}}>
            <div style={{color:'#C8A951',fontFamily:'Cinzel,serif',fontSize:9,letterSpacing:2}}>DICE</div>
            <div style={{display:'flex',gap:10}}><Die v={dice[0]} rolling={rolling} rev={false}/><Die v={dice[1]} rolling={rolling} rev={true}/></div>
            <div style={{color:'#D4C080',fontFamily:'Cinzel,serif',fontSize:12}}>Sum: {dice[0]+dice[1]}</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            <button onClick={doRoll} disabled={phase!=='roll'||rolling||curPl.bankrupt}
              style={{padding:'11px',borderRadius:7,background:phase==='roll'?'linear-gradient(135deg,#7B5C10,#C8A951)':'rgba(255,255,255,0.04)',border:`1px solid ${phase==='roll'?'#D4A017':'rgba(255,255,255,0.09)'}`,color:phase==='roll'?'#1A0A00':'rgba(255,255,255,0.25)',cursor:phase==='roll'?'pointer':'not-allowed',fontFamily:'Cinzel,serif',fontWeight:700,fontSize:12}}>
              🎲 Roll Dice
            </button>
            {curPl.inJail&&curPl.jailFree>0&&phase==='roll'&&(
              <button onClick={()=>{setPlayers(ps=>ps.map(p=>p.id===cur?{...p,jailFree:p.jailFree-1,inJail:false,jailTurns:0}:p));addLog(`${curPl.name} uses Exile Free card!`);}} style={{padding:'9px',borderRadius:7,background:'rgba(200,169,81,0.12)',border:'1px solid rgba(200,169,81,0.35)',color:'#FFE082',cursor:'pointer',fontFamily:'Cinzel,serif',fontSize:11}}>🦅 Use Exile Card</button>
            )}
            <button onClick={endTurn} disabled={phase!=='end'}
              style={{padding:'11px',borderRadius:7,background:phase==='end'?'rgba(100,200,100,0.12)':'rgba(255,255,255,0.03)',border:`1px solid ${phase==='end'?'rgba(100,200,100,0.35)':'rgba(255,255,255,0.06)'}`,color:phase==='end'?'#A5D6A7':'rgba(255,255,255,0.2)',cursor:phase==='end'?'pointer':'not-allowed',fontFamily:'Cinzel,serif',fontSize:12}}>
              ✅ End Turn
            </button>
          </div>
          {/* Legend */}
          <div style={{background:'rgba(0,0,0,0.28)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:9,padding:10}}>
            <div style={{color:'#C8A951',fontFamily:'Cinzel,serif',fontSize:9,letterSpacing:2,marginBottom:6}}>BOARD LEGEND</div>
            {[['🔥','Yagna Altar','#FCD34D'],['⭐','Planetary Oracle','#A78BFA'],['⚔️','Weapon Hoard','#FCA5A5'],['🌺','Grama Devata','#F9A8D4'],['🌊','River Festival','#6EE7B7'],['🛤️','Trade Route','#9CA3AF']].map(([icon,name,col])=>(
              <div key={name} style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                <span style={{fontSize:10}}>{icon}</span>
                <div style={{color:col,fontSize:9,fontFamily:'EB Garamond,serif'}}>{name}</div>
              </div>
            ))}
          </div>
          <div style={{background:'rgba(0,0,0,0.28)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:9,padding:10}}>
            <div style={{color:'#C8A951',fontFamily:'Cinzel,serif',fontSize:9,letterSpacing:2,marginBottom:6}}>PROPERTIES</div>
            {Object.entries(GC).map(([g,col])=>(
              <div key={g} style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                <div style={{width:9,height:9,background:col,borderRadius:1,flexShrink:0}}/>
                <div style={{color:'rgba(255,255,255,0.4)',fontSize:9,fontFamily:'EB Garamond,serif',flex:1,textTransform:'capitalize'}}>{g}</div>
                <div style={{fontSize:8,color:'rgba(255,255,255,0.25)'}}>{BUILD_COST[g]}g</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      {/* ─── MODALS ─── */}
      {modal?.type==='yagna'&&<YagnaModal player={modal.player} onPerform={y=>applyYagna(y,modal.player)} onSkip={()=>{setModal(null);setPhase('end');}}/>}
      {modal?.type==='planet'&&<PlanetModal event={modal.event} player={modal.player} players={players} onApply={(ev,pl,ex)=>applyPlanet(ev,pl,ex)} onClose={()=>{setModal(null);setPhase('end');}}/>}
      {modal?.type==='festival'&&<FestivalModal event={modal.event} players={players} onApply={()=>applyFestival(modal.event,modal.player)} onClose={()=>{setModal(null);setPhase('end');}}/>}
      {modal?.type==='weaponHoard'&&<WeaponHoardModal player={modal.player} onTake={wid=>takeWeapon(wid,modal.player)} onSkip={()=>{setModal(null);setPhase('end');}}/>}
      {modal?.type==='weaponUse'&&<WeaponUseModal weaponId={modal.weaponId} player={modal.player} players={players} pst={pst} onUse={(w,tp,tpr)=>{useWeapon(w,tp,tpr);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal?.type==='card'&&<CardModal card={modal.card} player={modal.player} players={players} onApply={(c,p,ex)=>applyDecreeCard(c,p,ex)} onClose={()=>{setModal(null);setPhase('end');}}/>}
      {modal?.type==='buy'&&<BuyModal sp={modal.space} player={modal.player} onBuy={()=>buyProp(modal.space,modal.player)} onPass={()=>{setModal(null);setPhase('end');}}/>}
      {modal?.type==='info'&&<InfoModal sp={modal.space} pst={pst} players={players} onClose={()=>setModal(null)}/>}
      {modal?.type==='quiz'&&<QuizModal player={modal.player} onResult={correct=>{if(correct){setPlayers(ps=>ps.map(p=>p.id===modal.player.id?{...p,gold:p.gold+300}:p));addLog(`${modal.player.name} answered correctly! +300g`);}else addLog(`${modal.player.name} missed the question.`);setModal(null);setPhase('end');}}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DakshinaRajya));
</script>
</body>
</html>
